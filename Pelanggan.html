<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>Pelanggan</h1>

<p>Data pelanggan otomatis dari transaksi penjualan</p>

</div>

<!-- TABLE -->

<div class="box">

<h2>Daftar Pelanggan</h2>

<table class="table">

<thead>

<tr>

<th>Nama Pelanggan</th>
<th>Total Belanja</th>
<th>Jumlah Transaksi</th>
<th>Status</th>

</tr>

</thead>

<tbody id="tablePelanggan">

</tbody>

</table>

</div>

</div>

<script>

function loadPelanggan(){

let transaksi = JSON.parse(
localStorage.getItem("transaksi")
) || [];

let pelangganMap = {};

transaksi.forEach(function(item){

const nama = item.pelanggan;

if(!nama) return;

if(!pelangganMap[nama]){

pelangganMap[nama] = {

nama:nama,
total:0,
jumlah:0

};

}

pelangganMap[nama].total +=
Number(item.total);

pelangganMap[nama].jumlah += 1;

});


let pelangganArray =
Object.values(pelangganMap);

let html = "";


if(pelangganArray.length > 0){

pelangganArray.forEach(function(item){

let statusClass =
"status-baru";

let statusText =
"Pelanggan Baru";

if(item.jumlah >= 3){

statusClass =
"status-tetap";

statusText =
"Pelanggan Tetap";

}

html += `

<tr>

<td>
${item.nama}
</td>

<td>

Rp ${item.total
.toLocaleString("id-ID")}

</td>

<td>

${item.jumlah}x

</td>

<td>

<div class="status ${statusClass}">

${statusText}

</div>

</td>

</tr>

`;

});

}else{

html = `

<tr>

<td colspan="4"
style="
text-align:center;
padding:30px;
color:#64748b;
">

Belum ada pelanggan

</td>

</tr>

`;

}

document.getElementById(
"tablePelanggan"
).innerHTML = html;

}

loadPelanggan();

</script>

</body>
